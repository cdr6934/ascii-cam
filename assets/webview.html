<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>ASCII Cam</title>
    <style>
      :root { --accent: #00f2fe; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100%; background: #000; color: #eee; overflow: hidden;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      #stage { position: relative; width: 100vw; height: 100vh; }
      /* live camera preview */
      video {
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; transform: scaleX(-1); background: #111;
      }
      /* rendered ASCII art: flex container centers the <pre> in the viewport */
      #art {
        position: absolute; inset: 0; background: #000; overflow: hidden;
        display: none; align-items: center; justify-content: center;
      }
      #art.show { display: flex; }
      /* the <pre> holds the actual character grid; white-space:pre keeps the rows intact */
      #artpre {
        margin: 0; white-space: pre; line-height: 1; letter-spacing: 0;
        font-family: "SFMono-Regular", Menlo, Consolas, "Courier New", monospace;
        user-select: none;
      }
      #status {
        position: absolute; top: 16px; left: 50%; transform: translateX(-50%); z-index: 6;
        background: rgba(0,0,0,.6); color: var(--accent); padding: 7px 14px; border-radius: 8px;
        font-size: 13px; max-width: 90vw; text-align: center;
      }
      #controls {
        position: absolute; bottom: 26px; left: 0; right: 0; z-index: 6;
        display: flex; gap: 12px; justify-content: center; align-items: center; flex-wrap: wrap;
      }
      button {
        font: inherit; font-weight: 700; border: 0; border-radius: 40px; padding: 14px 26px;
        background: var(--accent); color: #001014; box-shadow: 0 6px 20px rgba(0,0,0,.5);
      }
      button.ghost { background: rgba(255,255,255,.14); color: #fff; }
      button:disabled { opacity: .4; }
      canvas { display: none; }
    </style>
  </head>
  <body>
    <div id="stage">
      <video id="cam" autoplay playsinline muted></video>
      <div id="art"><pre id="artpre"></pre></div>
      <div id="status">Starting camera…</div>
      <div id="controls">
        <button id="capture" disabled>Capture</button>
        <button id="save" style="display:none">Save</button>
        <button id="retake" class="ghost" style="display:none">Retake</button>
      </div>
      <canvas id="sample"></canvas>
    </div>

    <script>
      // Lightest -> densest coverage. On a black background, brighter pixels map to denser,
      // more visible glyphs and dark pixels fade to spaces.
      const RAMP = " .:-=+*#%@";

      const video = document.getElementById("cam");
      const art = document.getElementById("art");
      const artPre = document.getElementById("artpre");
      const statusEl = document.getElementById("status");
      const captureBtn = document.getElementById("capture");
      const saveBtn = document.getElementById("save");
      const retakeBtn = document.getElementById("retake");
      const canvas = document.getElementById("sample");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });

      const esc = (c) => (c === "<" ? "&lt;" : c === ">" ? "&gt;" : c === "&" ? "&amp;" : c);
      const glyph = (lum) => RAMP[Math.min(RAMP.length - 1, Math.floor((lum / 256) * RAMP.length))];
      const tint = (v) => Math.min(255, Math.round(v * 1.15 + 12)); // a touch more saturated

      // Last captured grid, kept so Save can re-render it to a PNG.
      let lastFrame = null; // { cols, rows, data }

      // --- Proportions: measure the REAL monospace cell aspect (charWidth / lineHeight) at
      // runtime so the art keeps the photo's true proportions on any device/font. ---
      let charAspect = 0.6;
      let aspectMeasured = false;
      function ensureAspect() {
        if (aspectMeasured) return;
        const fam = getComputedStyle(artPre).fontFamily || "monospace";
        const probe = document.createElement("pre");
        probe.style.cssText =
          "position:absolute;left:-9999px;top:-9999px;margin:0;white-space:pre;" +
          "line-height:1;font-size:100px;font-family:" + fam + ";";
        probe.textContent = "M".repeat(50);
        document.body.appendChild(probe);
        const w = probe.getBoundingClientRect().width / 50;
        document.body.removeChild(probe);
        if (w > 0) charAspect = w / 100; // line height is 100px
        aspectMeasured = true;
      }

      let camWatchdog = null;
      function markReady() {
        if (camWatchdog) { clearTimeout(camWatchdog); camWatchdog = null; }
        if (!captureBtn.disabled) return;
        statusEl.textContent = "Tap Capture to make ASCII art";
        captureBtn.disabled = false;
      }
      // Attach BEFORE play() so we never miss an event that already fired, and also
      // handle the case where the frame is ready synchronously.
      function watchForFrame() {
        const onReady = () => { if (video.videoWidth > 0) { cleanup(); markReady(); } };
        function cleanup() {
          ["loadeddata", "canplay", "playing", "timeupdate"].forEach((ev) =>
            video.removeEventListener(ev, onReady));
        }
        if (video.readyState >= 2 && video.videoWidth > 0) { markReady(); return; }
        ["loadeddata", "canplay", "playing", "timeupdate"].forEach((ev) =>
          video.addEventListener(ev, onReady));
      }

      async function getStream() {
        try {
          return await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false,
          });
        } catch (e) {
          return await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        }
      }

      async function startCamera() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          statusEl.textContent = "This webview has no camera API (getUserMedia unavailable).";
          return;
        }
        statusEl.textContent = "Starting camera…";
        camWatchdog = setTimeout(() => {
          if (captureBtn.disabled) {
            statusEl.textContent =
              "Camera didn't start. Allow camera permission for the app, then reopen the skill.";
          }
        }, 8000);
        try {
          const stream = await getStream();
          video.srcObject = stream;
          watchForFrame();
          await video.play().catch(() => {});
          watchForFrame();
        } catch (err) {
          if (camWatchdog) { clearTimeout(camWatchdog); camWatchdog = null; }
          statusEl.textContent = "Camera error: " + (err && err.name ? err.name + " — " + err.message : err);
        }
      }

      // Sample the whole frame to a character grid and emit colored ASCII for the ENTIRE image.
      function renderAscii() {
        const vw = video.videoWidth;
        const vh = video.videoHeight;
        if (!vw || !vh) return false;
        ensureAspect();

        // Columns from screen width; rows from image aspect scaled by the measured cell aspect.
        const cols = Math.max(60, Math.min(120, Math.floor(window.innerWidth / 5)));
        const rows = Math.max(1, Math.round((vh / vw) * cols * charAspect));

        canvas.width = cols;
        canvas.height = rows;
        // Mirror to match the (mirrored) preview the user saw.
        ctx.save();
        ctx.translate(cols, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, cols, rows);
        ctx.restore();

        const { data } = ctx.getImageData(0, 0, cols, rows);
        lastFrame = { cols, rows, data };

        let html = "";
        for (let y = 0; y < rows; y++) {
          for (let x = 0; x < cols; x++) {
            const i = (y * cols + x) * 4;
            const r = data[i], g = data[i + 1], b = data[i + 2];
            const lum = 0.299 * r + 0.587 * g + 0.114 * b;
            html += `<span style="color:rgb(${tint(r)},${tint(g)},${tint(b)})">${esc(glyph(lum))}</span>`;
          }
          html += "\n";
        }
        artPre.innerHTML = html;

        // Fit the WHOLE grid on screen by the tighter of width/height.
        const fontByWidth = window.innerWidth / (cols * charAspect);
        const fontByHeight = window.innerHeight / (rows * 1.0);
        artPre.style.fontSize = Math.max(3, Math.floor(Math.min(fontByWidth, fontByHeight))) + "px";
        return true;
      }

      // Re-render the captured grid to a crisp PNG canvas for saving.
      function drawToCanvas(cellH) {
        if (!lastFrame) return null;
        const { cols, rows, data } = lastFrame;
        const cellW = cellH * charAspect;
        const out = document.createElement("canvas");
        out.width = Math.ceil(cols * cellW);
        out.height = Math.ceil(rows * cellH);
        const g = out.getContext("2d");
        g.fillStyle = "#000";
        g.fillRect(0, 0, out.width, out.height);
        g.font = cellH + 'px ' + (getComputedStyle(artPre).fontFamily || "monospace");
        g.textBaseline = "top";
        for (let y = 0; y < rows; y++) {
          for (let x = 0; x < cols; x++) {
            const i = (y * cols + x) * 4;
            const r = data[i], gg = data[i + 1], b = data[i + 2];
            const lum = 0.299 * r + 0.587 * gg + 0.114 * b;
            g.fillStyle = `rgb(${tint(r)},${tint(gg)},${tint(b)})`;
            g.fillText(glyph(lum), x * cellW, y * cellH);
          }
        }
        return out;
      }

      async function saveImage() {
        const out = drawToCanvas(18); // 18px per row → a sharp, shareable PNG
        if (!out) { statusEl.style.display = "block"; statusEl.textContent = "Nothing to save yet."; return; }
        out.toBlob(async (blob) => {
          if (!blob) { notifySave("Could not encode image."); return; }
          const file = new File([blob], "ascii-cam.png", { type: "image/png" });
          // Prefer the native share sheet (lets the user save to Photos) on mobile webviews.
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try { await navigator.share({ files: [file], title: "ASCII Cam" }); return; }
            catch (e) { if (e && e.name === "AbortError") return; }
          }
          // Fallback: trigger a download.
          try {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = "ascii-cam.png";
            document.body.appendChild(a); a.click(); a.remove();
            setTimeout(() => URL.revokeObjectURL(url), 1500);
          } catch (e) {
            notifySave("Saving isn't supported in this webview.");
          }
        }, "image/png");
      }

      function notifySave(msg) {
        statusEl.style.display = "block";
        statusEl.textContent = msg;
        setTimeout(() => { statusEl.style.display = "none"; }, 3000);
      }

      function capture() {
        if (!renderAscii()) { statusEl.textContent = "Frame not ready yet — try again."; return; }
        const stream = video.srcObject;
        if (stream) stream.getTracks().forEach((t) => t.stop());
        video.style.display = "none";
        art.classList.add("show");
        statusEl.style.display = "none";
        captureBtn.style.display = "none";
        saveBtn.style.display = "inline-block";
        retakeBtn.style.display = "inline-block";
      }

      function retake() {
        art.classList.remove("show");
        statusEl.style.display = "block";
        statusEl.textContent = "Starting camera…";
        captureBtn.style.display = "inline-block";
        captureBtn.disabled = true;
        saveBtn.style.display = "none";
        retakeBtn.style.display = "none";
        video.style.display = "block";
        startCamera();
      }

      captureBtn.addEventListener("click", capture);
      saveBtn.addEventListener("click", saveImage);
      retakeBtn.addEventListener("click", retake);
      startCamera();
    </script>
  </body>
</html>
