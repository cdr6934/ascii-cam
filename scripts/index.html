<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASCII Cam</title>
  </head>
  <body>
    <script>
      // The camera capture and ASCII rendering all happen in the rendered webview
      // (assets/webview.html). This entry point just opens it; the skill needs no input.
      window["ai_edge_gallery_get_result"] = async (data) => {
        try {
          return JSON.stringify({
            result: "Camera ready — tap Capture to make ASCII art.",
            webview: { url: "webview.html", aspectRatio: 0.75 },
          });
        } catch (e) {
          console.error(e);
          return JSON.stringify({ error: `Failed to open ASCII Cam: ${e.message}` });
        }
      };
    </script>
  </body>
</html>
